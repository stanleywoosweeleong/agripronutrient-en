<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>AgriPro 农学笔记</title>
  <meta name="description" content="Bilingual agronomy notebook — nutrient deficiency, soil-pH interactions, tank-mix rules, smart fertilizer advisor." />

  <!-- PWA core -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#1c4c2f" />
  <meta name="color-scheme" content="light" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AgriPro" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <!-- Favicons -->
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />

  <!-- Precompiled Tailwind CSS — self-hosted, works offline -->
  <link rel="stylesheet" href="vendor/app.css" />

  <!-- Bare-minimum splash styling, inlined so the splash still looks right
       even if vendor/app.css fails to load (the diagnostic screen needs this). -->
  <style>
    html, body { height: 100%; margin: 0; background: #fafaf9; }
    #pwa-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      background: linear-gradient(180deg, #1c4c2f 0%, #0f301e 100%);
      color: #f0fadc;
      font-family: system-ui, -apple-system, sans-serif;
      transition: opacity .35s ease;
    }
    #pwa-splash.hidden { opacity: 0; pointer-events: none; }
    #pwa-splash > svg { width: 96px; height: 96px; animation: pwa-pulse 1.6s ease-in-out infinite; }
    #pwa-splash .label { font-weight: 700; letter-spacing: .15em; opacity: .9; }
    @keyframes pwa-pulse {
      0%, 100% { transform: scale(1);    opacity: .85; }
      50%      { transform: scale(1.06); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Splash screen: shown until React fires the `agripro:mounted` event -->
  <div class="pwa-splash" id="pwa-splash" aria-hidden="true">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 12 C72 18 86 38 86 60 C86 78 72 88 50 88 C28 88 14 78 14 60 C14 38 28 18 50 12 Z"
            fill="#f0fadc" />
      <path d="M50 12 L50 88" stroke="#78aa5a" stroke-width="3" stroke-linecap="round"/>
      <path d="M50 35 L65 30 M50 50 L70 45 M50 65 L65 62"
            stroke="#78aa5a" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div class="label">AgriPro</div>
    <noscript>
      <div style="margin-top:1.5rem;max-width:280px;text-align:center;font-size:.9rem;opacity:.9;">
        本应用需要启用 JavaScript 才能运行。<br>
        This app requires JavaScript.
      </div>
    </noscript>
  </div>

  <!--
    Self-hosted vendor bundles. Order matters:
      1. react.production.min.js          -> defines window.React
      2. react-dom.production.min.js      -> defines window.ReactDOM  (depends on React)
      3. tiny shim aliases window.react = React  (lucide UMD looks for lowercase)
      4. lucide-react.min.js              -> defines window.LucideReact
      5. app.js                           -> reads React, ReactDOM, LucideReact, mounts the app
    All marked `defer` so they execute in source order *after* HTML parse but before DOMContentLoaded.
  -->
  <script defer src="vendor/react.production.min.js"></script>
  <script defer src="vendor/react-dom.production.min.js"></script>
  <script defer src="vendor/lucide-bridge.js"></script>
  <script defer src="vendor/lucide-react.min.js"></script>
  <script defer src="app.js"></script>

  <!-- Splash + service worker plumbing.
       Inline so there is exactly one network round-trip needed before paint. -->
  <script>
    // 1. Splash + diagnostic plumbing.
    //    The splash hides once React fires `agripro:mounted`. If anything fails
    //    before that, we surface the *actual* error directly — not a vague "timeout".
    (function () {
      var splash = document.getElementById('pwa-splash');
      var fatalShown = false;
      var failedAssets = [];

      function hide() {
        if (!splash) return;
        splash.classList.add('hidden');
        setTimeout(function () { splash.remove(); }, 400);
      }

      function showFatal(title, detail) {
        if (fatalShown || !splash) return;
        fatalShown = true;
        // Inline styles so this works even when vendor/app.css failed to load.
        splash.style.cssText =
          'position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;' +
          'justify-content:center;gap:1rem;background:linear-gradient(180deg,#1c4c2f,#0f301e);' +
          'color:#f0fadc;font-family:system-ui,sans-serif;z-index:9999;padding:1.5rem;';
        var detailHtml = detail ? detail.replace(/&/g,'&amp;').replace(/</g,'&lt;') : '';
        splash.innerHTML =
          '<div style="max-width:520px;text-align:center;">' +
            '<div style="font-size:1.15rem;font-weight:700;margin-bottom:.6rem;">' + title + '</div>' +
            '<div style="opacity:.9;font-size:.9rem;line-height:1.55;white-space:pre-wrap;text-align:left;' +
                  'background:rgba(0,0,0,.25);padding:.85rem 1rem;border-radius:.6rem;' +
                  'font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.78rem;">' +
              detailHtml +
            '</div>' +
            '<div style="opacity:.75;font-size:.85rem;margin-top:1.1rem;">' +
              '请刷新页面重试，或检查所有文件是否在正确位置。<br>' +
              'Refresh, or verify all files are in the correct folders.' +
            '</div>' +
          '</div>';
      }

      // 2. Catch every asset load failure (404, MIME mismatch, etc.) immediately
      //    by using the capture phase of `error` events on the window.
      window.addEventListener('error', function (e) {
        var el = e.target;
        // Resource errors have a target that isn't `window`
        if (el && el !== window && (el.src || el.href)) {
          var url = el.src || el.href;
          failedAssets.push(url);
          showFatal(
            '资源加载失败 / Asset failed to load',
            'Missing or unreachable file(s):\n  ' + failedAssets.join('\n  ') +
            '\n\nMost likely cause: the vendor/ subfolder was not preserved' +
            '\nwhen the files were downloaded or copied. Check that you have:' +
            '\n  • index.html, app.js, sw.js in the root' +
            '\n  • vendor/app.css' +
            '\n  • vendor/react.production.min.js' +
            '\n  • vendor/react-dom.production.min.js' +
            '\n  • vendor/lucide-bridge.js' +
            '\n  • vendor/lucide-react.min.js'
          );
          return;
        }
        // Script-level runtime error (not a resource 404)
        var root = document.getElementById('root');
        if (root && root.firstChild) return; // app already up
        showFatal('脚本错误 / Script error', (e.message || 'unknown') +
                  (e.filename ? '\n  at ' + e.filename + ':' + (e.lineno || '?') : ''));
      }, /* capture = */ true);

      // 3. Normal mount path
      window.addEventListener('agripro:mounted', function () {
        clearTimeout(safety);
        hide();
      }, { once: true });

      // 4. Last-resort timeout for cases that produce no error event at all
      //    (e.g. a script loads but its globals are wrong) — generous, 8s.
      var safety = setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.firstChild) { hide(); return; }
        // Try to be specific about what went wrong
        var details = [];
        if (typeof window.React === 'undefined') details.push('window.React is undefined');
        if (typeof window.ReactDOM === 'undefined') details.push('window.ReactDOM is undefined');
        if (typeof window.LucideReact === 'undefined') details.push('window.LucideReact is undefined');
        if (!details.length) details.push('All globals are present but React did not mount.');
        showFatal('应用初始化超时 / Init timeout',
                  details.join('\n') +
                  '\n\nCheck the browser DevTools Console for the underlying error.');
      }, 8000);
    })();

    // 2. Service worker registration.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').then(function (reg) {
          if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
          reg.addEventListener('updatefound', function () {
            var sw = reg.installing;
            if (!sw) return;
            sw.addEventListener('statechange', function () {
              if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                sw.postMessage('SKIP_WAITING');
              }
            });
          });
        }).catch(function (err) {
          console.warn('SW registration failed:', err);
        });

        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
